<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SHOP-IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fas fa-store text-indigo-600 text-2xl"></i>
                <span class="text-2xl font-black text-indigo-600">SHOP-IT</span>
            </a>
        </div>
    </nav>

    <!-- Progress Steps -->
    <div class="bg-white border-b py-6 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between">
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold">1</div>
                    <p class="text-sm font-bold mt-2">Shipping</p>
                </div>
                <div class="flex-1 border-b border-gray-300 mx-2 mt-5"></div>
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-bold">2</div>
                    <p class="text-sm font-bold mt-2">Payment</p>
                </div>
                <div class="flex-1 border-b border-gray-300 mx-2 mt-5"></div>
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center font-bold">3</div>
                    <p class="text-sm font-bold mt-2">Confirmation</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Content -->
    <section class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Forms -->
            <div class="lg:col-span-2">
                <!-- Shipping Address -->
                <div class="bg-white rounded-lg shadow p-6 mb-6" id="shipping-section">
                    <h2 class="text-2xl font-bold mb-6">Shipping Address</h2>
                    <form id="shipping-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="first-name" placeholder="First Name" required class="px-4 py-2 border border-gray-300 rounded-lg">
                            <input type="text" id="last-name" placeholder="Last Name" required class="px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <input type="email" id="email" placeholder="Email Address" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <input type="tel" id="phone" placeholder="Phone Number" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <input type="text" id="address" placeholder="Street Address" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <div class="grid grid-cols-3 gap-4">
                            <input type="text" id="city" placeholder="City" required class="px-4 py-2 border border-gray-300 rounded-lg">
                            <input type="text" id="state" placeholder="State" required class="px-4 py-2 border border-gray-300 rounded-lg">
                            <input type="text" id="zip" placeholder="ZIP Code" required class="px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <select id="country" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <option>Select Country</option>
                            <option>United States</option>
                            <option>Canada</option>
                            <option>Mexico</option>
                            <option>UK</option>
                            <option>Other</option>
                        </select>
                        <button type="button" id="continue-payment-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700">
                            Continue to Payment
                        </button>
                    </form>
                </div>

                <!-- Payment Method -->
                <div class="bg-white rounded-lg shadow p-6" id="payment-section" style="display: none;">
                    <h2 class="text-2xl font-bold mb-6">Payment Method</h2>
                    <form id="payment-form" class="space-y-4">
                        <div class="space-y-3 mb-6">
                            <label class="flex items-center p-4 border border-indigo-600 rounded-lg cursor-pointer bg-indigo-50">
                                <input type="radio" name="payment-method" value="card" checked class="mr-3" data-method="card">
                                <i class="fas fa-credit-card text-indigo-600 mr-3 text-lg"></i>
                                <span>Credit/Debit Card</span>
                            </label>
                            <label class="flex items-center p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="payment-method" value="paypal" class="mr-3" data-method="paypal">
                                <i class="fab fa-paypal text-blue-600 mr-3 text-lg"></i>
                                <span>PayPal</span>
                            </label>
                            <label class="flex items-center p-4 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="payment-method" value="apple" class="mr-3" data-method="apple">
                                <i class="fab fa-apple text-gray-700 mr-3 text-lg"></i>
                                <span>Apple Pay</span>
                            </label>
                        </div>

                        <!-- Card Form -->
                        <div id="card-form" class="space-y-4">
                            <input type="text" id="card-name" placeholder="Cardholder Name" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <input type="text" id="card-number" placeholder="Card Number" maxlength="19" class="w-full px-4 py-2 border border-gray-300 rounded-lg font-mono">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" class="px-4 py-2 border border-gray-300 rounded-lg">
                                <input type="text" id="card-cvv" placeholder="CVV" maxlength="4" class="px-4 py-2 border border-gray-300 rounded-lg">
                            </div>
                        </div>

                        <div class="flex space-x-4 pt-4">
                            <button type="button" id="back-shipping-btn" class="flex-1 border border-gray-300 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-50">
                                Back to Shipping
                            </button>
                            <button type="button" id="complete-order-btn" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">
                                Complete Order
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="bg-white rounded-lg shadow p-6 h-fit">
                <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
                <div id="checkout-items" class="space-y-4 mb-6 border-b pb-6 max-h-96 overflow-y-auto">
                    <!-- Items will be loaded here -->
                </div>
                <div class="space-y-4 mb-6">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Subtotal</span>
                        <span id="checkout-subtotal">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Shipping</span>
                        <span id="checkout-shipping">FREE</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Tax</span>
                        <span id="checkout-tax">$0.00</span>
                    </div>
                </div>
                <div class="flex justify-between text-2xl font-bold">
                    <span>Total</span>
                    <span id="checkout-total" class="text-indigo-600">$0.00</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-16 px-6 mt-16">
        <div class="max-w-7xl mx-auto text-center text-gray-400">
            <p>&copy; 2026 SHOP-IT. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Checkout logic
        document.addEventListener('DOMContentLoaded', () => {
            loadCheckoutSummary();

            document.getElementById('continue-payment-btn').addEventListener('click', validateShipping);
            document.getElementById('back-shipping-btn').addEventListener('click', backToShipping);
            document.getElementById('complete-order-btn').addEventListener('click', completeOrder);

            // Card number formatting
            document.getElementById('card-number').addEventListener('input', (e) => {
                let value = e.target.value.replace(/\s/g, '');
                let formatted = value.replace(/(\d{4})/g, '$1 ').trim();
                e.target.value = formatted;
            });

            // Card expiry formatting
            document.getElementById('card-expiry').addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length >= 2) {
                    value = value.slice(0, 2) + '/' + value.slice(2, 4);
                }
                e.target.value = value;
            });
        });

        function validateShipping() {
            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const zip = document.getElementById('zip').value.trim();

            if (!firstName || !lastName || !email || !phone || !address || !city || !state || !zip) {
                alert('Please fill in all required fields');
                return;
            }

            // Store shipping info
            localStorage.setItem('shippingInfo', JSON.stringify({
                firstName, lastName, email, phone, address, city, state, zip
            }));

            // Switch to payment
            document.getElementById('shipping-section').style.display = 'none';
            document.getElementById('payment-section').style.display = 'block';
        }

        function backToShipping() {
            document.getElementById('shipping-section').style.display = 'block';
            document.getElementById('payment-section').style.display = 'none';
        }

        function completeOrder() {
            const cardName = document.getElementById('card-name').value.trim();
            const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
            const cardExpiry = document.getElementById('card-expiry').value;
            const cardCvv = document.getElementById('card-cvv').value;

            if (!cardName || !cardNumber || !cardExpiry || !cardCvv) {
                alert('Please fill in all card details');
                return;
            }

            if (cardNumber.length !== 16) {
                alert('Please enter a valid card number');
                return;
            }

            // Create order
            const order = {
                id: 'ORD-' + Date.now(),
                date: new Date().toLocaleString(),
                items: JSON.parse(localStorage.getItem('cart') || '[]'),
                shippingInfo: JSON.parse(localStorage.getItem('shippingInfo') || '{}'),
                total: parseFloat(document.getElementById('checkout-total').textContent.replace('$', ''))
            };

            // Save order
            let orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));

            // Clear cart
            localStorage.removeItem('cart');
            localStorage.removeItem('shippingInfo');

            // Redirect to confirmation
            window.location.href = 'order-confirmation.html?orderId=' + order.id;
        }

        function loadCheckoutSummary() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const itemsDiv = document.getElementById('checkout-items');
            let subtotal = 0;

            itemsDiv.innerHTML = '';
            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                itemsDiv.innerHTML += `
                    <div class="flex justify-between items-center text-sm">
                        <div>
                            <p class="font-medium">${item.name}</p>
                            <p class="text-gray-500">Qty: ${item.quantity}</p>
                        </div>
                        <p class="font-bold">$${(item.price * item.quantity).toFixed(2)}</p>
                    </div>
                `;
            });

            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            document.getElementById('checkout-subtotal').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('checkout-tax').textContent = '$' + tax.toFixed(2);
            document.getElementById('checkout-total').textContent = '$' + total.toFixed(2);
        }
    </script>
</body>
</html>
