<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | SHOP-IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fas fa-store text-indigo-600 text-2xl"></i>
                <span class="text-2xl font-black text-indigo-600">SHOP-IT</span>
            </a>
            <div class="flex items-center space-x-6">
                <a href="accounts.html" class="hover:text-indigo-600"><i class="fas fa-user text-xl"></i></a>
                <a href="cart.html" class="hover:text-indigo-600 relative">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span class="cart-count absolute -top-2 -right-2 bg-indigo-600 text-white text-xs px-1.5 rounded-full">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Cart Content -->
    <section class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-4xl font-bold mb-8">Shopping Cart</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Cart Items -->
            <div class="lg:col-span-2">
                <div id="cart-items" class="bg-white rounded-lg shadow">
                    <!-- Cart items will be loaded here -->
                    <div class="p-8 text-center">
                        <i class="fas fa-shopping-cart text-4xl text-gray-400 mb-4"></i>
                        <p class="text-gray-600">Your cart is empty</p>
                        <a href="index.html" class="inline-block mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Continue Shopping</a>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="bg-white rounded-lg shadow p-6 h-fit">
                <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
                
                <div class="space-y-4 mb-6 border-b pb-6">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Subtotal</span>
                        <span id="subtotal" class="font-bold">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Shipping</span>
                        <span id="shipping" class="font-bold text-green-600">FREE</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Tax</span>
                        <span id="tax" class="font-bold">$0.00</span>
                    </div>
                </div>

                <div class="flex justify-between text-2xl font-bold mb-6">
                    <span>Total</span>
                    <span id="total" class="text-indigo-600">$0.00</span>
                </div>

                <button id="checkout-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition mb-3">
                    Proceed to Checkout
                </button>
                <a href="index.html" class="w-full block text-center border border-indigo-600 text-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-50 transition">
                    Continue Shopping
                </a>

                <!-- Promo Code -->
                <div class="mt-6 border-t pt-6">
                    <input type="text" id="promo-code" placeholder="Enter promo code" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-2">
                    <button id="apply-promo-btn" class="w-full bg-gray-200 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-300">
                        Apply Code
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-16 px-6 mt-16">
        <div class="max-w-7xl mx-auto text-center text-gray-400">
            <p>&copy; 2026 SHOP-IT. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // Load cart on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
            
            document.getElementById('checkout-btn').addEventListener('click', () => {
                const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                if (cart.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }
                window.location.href = 'checkout.html';
            });

            document.getElementById('apply-promo-btn').addEventListener('click', applyPromoCode);
        });
    </script>
</body>
</html>
